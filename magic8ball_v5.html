<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magic 8 Ball 3D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #505466;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
    }
    canvas {
      display: block;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    .ui {
      position: fixed;
      left: 16px;
      right: 16px;
      bottom: 18px;
      display: grid;
      gap: 10px;
      max-width: 720px;
      margin: 0 auto;
      pointer-events: none;
    }
    .panel {
      pointer-events: auto;
      background: rgba(10, 12, 18, 0.55);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 14px;
      padding: 10px;
      display: grid;
      gap: 8px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }
    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }
    .q {
      width: 100%;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.95);
      padding: 10px 12px;
      font-size: 14px;
      font-family: Georgia, serif;
      outline: none;
    }
    .q::placeholder { color: rgba(255,255,255,0.55); }
    .btn {
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.10);
      color: rgba(255,255,255,0.92);
      padding: 10px 12px;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-family: Georgia, serif;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn:active { transform: translateY(1px); }
    .answer {
      min-height: 44px;
      display: grid;
      align-items: center;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(0,0,0,0.18);
      padding: 10px 12px;
      color: rgba(255,255,255,0.92);
      font-size: 14px;
      font-family: Georgia, serif;
      line-height: 1.35;
    }
    /* Hide bottom UI blocks (keep code intact) */
    #q,
    #ask,
    #enableMotion,
    #motionDebug,
    #motionStatus {
      display: none !important;
    }

    /* Phone / tablet UA: no webcam UI; show Enable Motion only */
    html.m8-mobile #camWrap,
    html.m8-mobile #camInstruction {
      display: none !important;
      visibility: hidden !important;
      pointer-events: none !important;
    }
    html.m8-mobile .motion-desktop-only {
      display: none !important;
    }
    html.m8-mobile #motionRow {
      grid-template-columns: 1fr !important;
    }
    html.m8-mobile #enableMotion {
      display: inline-block !important;
      width: 100%;
      max-width: 100%;
      box-sizing: border-box;
      margin-top: 6px;
      padding: 12px 14px;
      font-size: 15px;
    }
    html.m8-mobile #enableMotion.hidden {
      display: none !important;
    }
    .cam {
      position: fixed;
      top: 14px;
      right: 14px;
      /* Responsive preview:
         - caps at 542px on large screens (baseline)
         - scales down on smaller screens
         - keeps 4:3 aspect ratio */
      width: clamp(260px, 34vw, 542px);
      max-width: 542px;
      aspect-ratio: 4 / 3;
      height: auto;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.22);
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      display: none;
      pointer-events: none;
    }
    .cam video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
      opacity: 0.95;
    }
    .cam .handCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      /* Mirror to match the mirrored video */
      transform: scaleX(-1);
    }
    .cam .handOverlay {
      /* PNG kept as fallback/reference only */
      display: none;
    }
    .cam .badge {
      position: absolute;
      left: 8px;
      bottom: 8px;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-family: Georgia, serif;
      color: rgba(255,255,255,0.82);
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      padding: 5px 8px;
    }
    .camInstruction {
      position: fixed;
      top: 14px;
      right: 14px;
      transform: translateY(calc(100% + 10px));
      max-width: min(520px, calc(100vw - 28px));
      color: rgba(255,255,255,0.80);
      font-size: 12px;
      line-height: 1.35;
      font-family: Georgia, serif;
      background: rgba(0,0,0,0.28);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 12px;
      padding: 8px 10px;
      pointer-events: none;
      display: none;
    }
    .hint {
      margin-top: 1.5rem;
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-family: Georgia, serif;
      text-align: center;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <p class="hint" id="hint">натисни на кулю</p>
  <div class="cam" id="camWrap" aria-hidden="true">
    <video id="cam" autoplay playsinline muted></video>
    <canvas id="handCanvas" class="handCanvas"></canvas>
    <img id="handOverlay" class="handOverlay" src="assets_hand_overlay.png" alt="" aria-hidden="true" />
    <div class="badge" id="camBadge">hand detect</div>
  </div>
  <div class="camInstruction" id="camInstruction" aria-hidden="true">
    Rotate one hand like you're holding a ball<br />
    or use two hands and shake an invisible ball to trigger
  </div>
  <div class="ui" aria-label="Magic 8 Ball UI">
    <div class="panel">
      <div class="row">
        <input id="q" class="q" type="text" autocomplete="off" placeholder="Напиши питання… (або просто натисни на кулю)" />
        <button id="ask" class="btn" type="button">Ask</button>
      </div>
      <div id="answer" class="answer">Задай питання і натисни на кулю.</div>
      <div class="row" id="motionRow" style="grid-template-columns: 1fr auto;">
        <div class="motion-desktop-only" style="color: rgba(255,255,255,0.72); font-size: 12px; font-family: Georgia, serif;">
          Motion: <span id="motionStatus">unknown</span>
        </div>
        <button id="enableMotion" class="btn" type="button">Enable Motion</button>
      </div>
      <div id="motionDebug" class="answer motion-desktop-only" style="min-height: 58px; font-size: 12px; color: rgba(255,255,255,0.78);">
        ax: —, ay: —, az: —, |a|: —
      </div>
    </div>
  </div>

  <script src="vendor/three.min.js"></script>

      "Не розраховуй на це.",
      "Моя відповідь — ні.",
      "Дуже сумнівно.",
      "Скоріше ні.",
      "Шанси малі.",
      "Ні."
    ];

    var pendingAnswer = null;
    function pickAnswer() {
      // If user typed a question, we still answer randomly (like a real 8-ball).
      var idx = Math.floor(Math.random() * ANSWERS.length);
      return ANSWERS[idx];
    }

    function triggerShake() {
      if (STATE !== "idle") return;
      STATE = "shaking";
      shakeStart = performance.now();
      hint.textContent = "...";
      pendingAnswer = pickAnswer();
      answerEl.textContent = "Думаю…";
    }

    // Tap / click fallback (all platforms)
    document.getElementById("c").addEventListener("pointerdown", function(e) {
      e.preventDefault();
      triggerShake();
    });

    // Expose trigger for sensor-based controllers (MediaPipe / DeviceMotion)
    window.__m8_triggerShake = triggerShake;

    askEl.addEventListener("click", function() {
      triggerShake();
    });
    qEl.addEventListener("keydown", function(e) {
      if (e.key === "Enter") triggerShake();
    });

    function animate() {
      requestAnimationFrame(animate);
      var now = performance.now();

      if (STATE === "shaking") {
        var elapsed = now - shakeStart;
        var progress = elapsed / SHAKE_DURATION;
        var intensity = Math.sin(progress * Math.PI) * 0.09;

        var sx = Math.sin(now * 0.05)  * intensity + Math.sin(now * 0.083) * intensity * 0.6 + Math.sin(now * 0.031) * intensity * 0.4;
        var sy = Math.sin(now * 0.047 + 1) * intensity * 0.7 + Math.sin(now * 0.071 + 2) * intensity * 0.5;
        var sz = Math.sin(now * 0.039 + 0.5) * intensity * 0.3;

        rootGroup.position.set(sx, sy, 0);
        rootGroup.rotation.z = sz;
        rootGroup.rotation.x = sy * 0.4;

        if (elapsed >= SHAKE_DURATION) {
          rootGroup.position.set(0, 0, 0);
          rootGroup.rotation.set(0, 0, 0);
          STATE = "flipping";
          flipped = !flipped;
          flipTarget = flipped ? Math.PI : 0;
          hint.textContent = flipped ? "натисни ще раз" : "натисни на кулю";
          if (pendingAnswer) answerEl.textContent = pendingAnswer;
        }
      }

      if (STATE === "flipping") {
        flipAngle += (flipTarget - flipAngle) * 0.08;
        decalGroup.rotation.y = flipAngle;
        if (Math.abs(flipAngle - flipTarget) < 0.0015) {
          flipAngle = flipTarget;
          decalGroup.rotation.y = flipAngle;
          STATE = "idle";
        }
      }

      var cosA = Math.cos(decalGroup.rotation.y);
      if (frontDecal) frontDecal.visible = cosA > -0.05;
      if (backDecal)  backDecal.visible  = cosA < 0.05;

      renderer.render(scene, camera);
    }
  </script>

  <script type="module">
    const MOBILE_UA_RE = /iPhone|iPad|iPod|Android/i;
    const isMobileUA = () => MOBILE_UA_RE.test(navigator.userAgent || "");

    const isProbablyMobile = () => {
      const ua = navigator.userAgent || "";
      return /Android|iPhone|iPad|iPod/i.test(ua) || (navigator.maxTouchPoints || 0) > 1;
    };

    // Hide webcam/MediaPipe UI on mobile UAs immediately (desktop path unchanged).
    if (isMobileUA()) document.documentElement.classList.add("m8-mobile");

    const trigger = () => {
      if (typeof window.__m8_triggerShake === "function") window.__m8_triggerShake();
    };

    // --- Mobile UA only: shake via DeviceMotion (reference: magic8ball_final.html) ---
    function setupPhoneShake() {
      const hint = document.getElementById("hint");
      const enableBtn = document.getElementById("enableMotion");
      const needsPermission =
        typeof DeviceMotionEvent !== "undefined" &&
        typeof DeviceMotionEvent.requestPermission === "function";

      const MOTION_DELTA_THRESH = 14;
      const COOLDOWN_MS = 2000;

      let armed = false;
      let lastAcc = { x: 0, y: 0, z: 0 };
      let hasMotionBaseline = false;
      let lastTriggerAt = 0;

      function onMotion(e) {
        if (!armed) return;
        const acc = e.accelerationIncludingGravity;
        if (!acc || acc.x === null || acc.y === null || acc.z === null) return;

        if (!hasMotionBaseline) {
          lastAcc = { x: acc.x, y: acc.y, z: acc.z };
          hasMotionBaseline = true;
          return;
        }

        const dx = acc.x - lastAcc.x;
        const dy = acc.y - lastAcc.y;
        const dz = acc.z - lastAcc.z;
        lastAcc = { x: acc.x, y: acc.y, z: acc.z };

        const delta = Math.sqrt(dx * dx + dy * dy + dz * dz);
        const now = performance.now();
        if (delta > MOTION_DELTA_THRESH && now - lastTriggerAt >= COOLDOWN_MS) {
          lastTriggerAt = now;
          trigger();
        }
      }

      function enableMotionListening() {
        if (armed) return;
        window.addEventListener("devicemotion", onMotion, { passive: true });
        armed = true;
        enableBtn?.classList.add("hidden");
        if (hint) hint.textContent = "струси телефон";
      }

      function onMotionDeniedOrError() {
        enableBtn?.classList.add("hidden");
        if (hint) hint.textContent = "Tap to activate";
      }

      if (!("DeviceMotionEvent" in window)) {
        enableBtn?.classList.add("hidden");
        if (hint) hint.textContent = "Tap to activate";
        return true;
      }

      // iOS 13+: button + requestPermission in tap handler (HTTPS). Android: attach immediately (reference final).
      if (needsPermission) {
        enableBtn?.classList.remove("hidden");
        enableBtn?.addEventListener("click", function () {
          DeviceMotionEvent.requestPermission()
            .then(function (result) {
              if (result === "granted") enableMotionListening();
              else onMotionDeniedOrError();
            })
            .catch(function () {
              onMotionDeniedOrError();
            });
        });
      } else {
        enableMotionListening();
      }

      return true;
    }

    // --- Desktop: MediaPipe hand shake detector (camera preview) ---
    async function setupHandShakeDesktop() {
      if (isProbablyMobile()) return false;
      if (!navigator.mediaDevices?.getUserMedia) return false;

      const camWrap = document.getElementById("camWrap");
      const video = document.getElementById("cam");
      const badge = document.getElementById("camBadge");
      const canvas = document.getElementById("handCanvas");
      if (!camWrap || !video) return false;

      camWrap.style.display = "block";
      badge.textContent = "camera…";

      let stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: 640, height: 480 }, audio: false });
      } catch (e) {
        badge.textContent = "camera blocked";
        return false;
      }
      video.srcObject = stream;
      await video.play().catch(() => {});

      badge.textContent = "loading hands…";

      // MediaPipe Tasks Vision (hands) – loaded as an ES module from CDN.
      // If CDN fails, desktop will still work via the Ask button (fallback).
      let vision;
      try {
        vision = await import("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14");
      } catch (e) {
        badge.textContent = "hands unavailable";
        return false;
      }

      const { FilesetResolver, HandLandmarker } = vision;

      let resolver;
      try {
        resolver = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
      } catch (e) {
        badge.textContent = "wasm blocked";
        return false;
      }

      const handLandmarker = await HandLandmarker.createFromOptions(resolver, {
        baseOptions: {
          modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task"
        },
        runningMode: "VIDEO",
        numHands: 2
      });

      badge.textContent = "gesture trigger";

      // Simple trigger: combined-hand centroid displacement between frames; stay "fast" ~0.3–0.5s.
      const COOLDOWN = 1800;
      const SPEED_FAST = 0.0075;       // min normalized movement per frame to count as "fast"
      const SUSTAIN_MS = 400;        // within 0.3–0.5s window
      const LOST_FAST_RESET_MS = 120; // brief gap below threshold resets the streak

      let lastTriggerAt = 0;
      let prevCombined = null;
      let prevStepAt = performance.now();
      let handSpeed = 0;
      let shakeEnergy = 0;
      let fastAccumMs = 0;
      let belowFastSince = null;
      let triggeredFlashUntil = 0;

      function handCentroid(lm) {
        if (!lm || !lm.length) return null;
        let x = 0, y = 0;
        for (const p of lm) {
          x += p.x;
          y += p.y;
        }
        const n = lm.length;
        return { x: x / n, y: y / n };
      }

      function combinedCentroid(hands) {
        let x = 0, y = 0, n = 0;
        for (const lm of hands) {
          const c = handCentroid(lm);
          if (!c) continue;
          x += c.x;
          y += c.y;
          n++;
        }
        if (!n) return null;
        return { x: x / n, y: y / n };
      }

      function tryGestureTrigger(now) {
        if (now - lastTriggerAt <= COOLDOWN) {
          fastAccumMs = 0;
          return false;
        }
        lastTriggerAt = now;
        fastAccumMs = 0;
        belowFastSince = null;
        shakeEnergy *= 0.2;
        trigger();
        triggeredFlashUntil = now + 1000;
        return true;
      }

      function updateBadge(now) {
        if (now < triggeredFlashUntil) {
          badge.textContent = "TRIGGERED";
          return;
        }
        let triggerState = "idle";
        if (now - lastTriggerAt <= COOLDOWN && lastTriggerAt > 0) triggerState = "cooldown";
        else triggerState = "accum+" + Math.round(fastAccumMs) + "ms";

        badge.textContent =
          handSpeed.toFixed(4) + " / " + shakeEnergy.toFixed(4) + " / " + triggerState;
      }

      // Dynamic skeleton overlay (landmarks) drawn into a canvas on top of video.
      const ctx = canvas?.getContext ? canvas.getContext("2d") : null;
      // Clean/minimal overlay: no landmark labels.

      const CONNECTIONS = [
        // thumb
        [0, 1], [1, 2], [2, 3], [3, 4],
        // index
        [0, 5], [5, 6], [6, 7], [7, 8],
        // middle
        [0, 9], [9, 10], [10, 11], [11, 12],
        // ring
        [0, 13], [13, 14], [14, 15], [15, 16],
        // pinky
        [0, 17], [17, 18], [18, 19], [19, 20],
        // palm across
        [5, 9], [9, 13], [13, 17],
      ];

      function resizeCanvasToWrap() {
        if (!canvas) return;
        const rect = camWrap.getBoundingClientRect();
        // account for device pixel ratio for crisp lines
        const dpr = window.devicePixelRatio || 1;
        const w = Math.max(1, Math.round(rect.width * dpr));
        const h = Math.max(1, Math.round(rect.height * dpr));
        if (canvas.width !== w || canvas.height !== h) {
          canvas.width = w;
          canvas.height = h;
        }
      }

      function clearCanvas() {
        if (!ctx || !canvas) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }

      function drawSkeleton(lm) {
        if (!ctx || !canvas) return;
        resizeCanvasToWrap();

        const dpr = window.devicePixelRatio || 1;
        const W = canvas.width;
        const H = canvas.height;

        // Lines (main + subtle 1px outline)
        ctx.save();
        ctx.lineCap = "round";
        ctx.lineJoin = "round";
        // 1.5x thinner than before
        const mainLineW = (2.2 / 1.5) * dpr;

        ctx.beginPath();
        for (const [a, b] of CONNECTIONS) {
          const pa = lm[a], pb = lm[b];
          if (!pa || !pb) continue;
          ctx.moveTo(pa.x * W, pa.y * H);
          ctx.lineTo(pb.x * W, pb.y * H);
        }
        // Outline pass (1px, 50% opacity)
        ctx.strokeStyle = "rgba(0, 255, 255, 0.50)";
        ctx.lineWidth = 1.0 * dpr;
        ctx.stroke();
        // Main pass
        ctx.strokeStyle = "rgba(0, 255, 255, 0.85)";
        ctx.lineWidth = mainLineW;
        ctx.stroke();

        // Points
        for (let i = 0; i < lm.length; i++) {
          const p = lm[i];
          if (!p) continue;
          const x = p.x * W, y = p.y * H;
          ctx.beginPath();
          // Minimal dots; make fingertip corners a bit more visible.
          const baseR = (4.0 / 3.0) * dpr;
          const isTip = (i === 4 || i === 8 || i === 12 || i === 16 || i === 20);
          const r = isTip ? baseR * 1.5 : baseR;
          ctx.arc(x, y, r, 0, Math.PI * 2);
          // 1px outline (50% opacity) + filled dot
          ctx.strokeStyle = "rgba(0, 255, 255, 0.50)";
          ctx.lineWidth = 1.0 * dpr;
          ctx.stroke();
          ctx.fillStyle = "rgba(0, 255, 255, 0.95)";
          ctx.fill();
        }
        ctx.restore();
      }

      function step() {
        if (video.readyState >= 2) {
          const ts = performance.now();
          const res = handLandmarker.detectForVideo(video, ts);
          const hands = res?.landmarks || [];

          if (hands.length) {
            if (ctx) {
              clearCanvas();
              for (const lm of hands) {
                if (lm && lm.length) drawSkeleton(lm);
              }
            }

            const now = performance.now();
            const dt = Math.min(64, Math.max(0, now - prevStepAt));
            prevStepAt = now;

            const cur = combinedCentroid(hands);

            handSpeed = 0;
            if (cur && prevCombined) {
              handSpeed = Math.hypot(cur.x - prevCombined.x, cur.y - prevCombined.y);
            }
            prevCombined = cur;

            shakeEnergy = shakeEnergy * 0.78 + handSpeed * 0.22;

            if (handSpeed >= SPEED_FAST) {
              belowFastSince = null;
              fastAccumMs += dt;
              if (fastAccumMs >= SUSTAIN_MS) tryGestureTrigger(now);
            } else {
              if (belowFastSince == null) belowFastSince = now;
              if (now - belowFastSince >= LOST_FAST_RESET_MS) {
                fastAccumMs = 0;
                belowFastSince = null;
              }
            }

            updateBadge(now);
          } else {
            prevCombined = null;
            prevStepAt = performance.now();
            fastAccumMs = 0;
            belowFastSince = null;
            handSpeed = 0;
            shakeEnergy *= 0.85;
            clearCanvas();
            updateBadge(performance.now());
          }
        }
        requestAnimationFrame(step);
      }
      requestAnimationFrame(step);
      return true;
    }

    // Activate correct controller based on platform
    if (isMobileUA()) {
      setupPhoneShake();
    } else {
      const ok = await setupHandShakeDesktop();
      if (!ok) {
        // If hand detection isn't available, keep the app usable with the Ask button.
        const hint = document.getElementById("hint");
        hint.textContent = "натисни на кулю";
      }
    }
  </script>
